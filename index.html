<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LSVC VAULT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2A1547;--ink-2:#352159;--ink-border:#473066;
    --brand:#371C5B;--magenta:#B70062;--seg-on:#5A2E86;
    --in:#15924F;--in-soft:#E3F3E9;--out:#C2670A;--out-soft:#FBEEDC;
    --paper:#FAF7F2;--paper-edge:#E8E0D6;--muted:#73697F;--hole:#1A1030;--line:#ECE6DE;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:'Inter',system-ui,sans-serif;color:#fff;background:radial-gradient(120% 80% at 50% -10%, #4A2570 0%, var(--ink) 60%) fixed;min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 16px 96px}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:13px}
  .crest{height:50px;width:auto;flex:none;filter:drop-shadow(0 5px 12px rgba(0,0,0,.35))}
  .brand h1{font-family:'Barlow Condensed';font-weight:700;font-size:26px;letter-spacing:.4px;margin:0;line-height:1;text-transform:uppercase}
  .brand p{margin:3px 0 0;font-size:12.5px;color:#CDBFE0;letter-spacing:.3px}
  .tally{display:flex;gap:8px;align-items:stretch}
  .pill{background:var(--ink-2);border:1px solid var(--ink-border);border-radius:12px;padding:8px 13px;text-align:center;min-width:66px}
  .pill b{font-family:'Barlow Condensed';font-size:24px;line-height:1;display:block}
  .pill span{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:#B3A6C2}
  .pill.in b{color:#5BD68E}.pill.out b{color:#F0A94B}
  .iconbtn{display:flex;align-items:center;gap:7px;background:var(--ink-2);border:1px solid var(--ink-border);color:#CDBFE0;border-radius:12px;padding:0 13px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.3px}
  .iconbtn:hover{border-color:#6a4d8a}
  .iconbtn svg{display:block}
  .lock.on{background:rgba(21,146,79,.16);border-color:#2f7d52;color:#7ee0a4}
  .refresh[hidden]{display:none}

  .footNote{font-size:12px;color:#B7A9C6;margin:0 0 16px;display:flex;align-items:center;gap:7px}
  .livedot{width:7px;height:7px;border-radius:50%;background:#5BD68E;box-shadow:0 0 0 3px rgba(91,214,142,.2);flex:none}
  .livedot.off{background:#8a7ca0;box-shadow:none}

  .controls{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .search{position:relative;flex:1;min-width:200px}
  .search input{width:100%;background:var(--ink-2);border:1px solid var(--ink-border);color:#fff;border-radius:11px;padding:11px 13px 11px 38px;font-size:14.5px;font-family:inherit}
  .search input::placeholder{color:#9286a3}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}
  .seg{display:flex;background:var(--ink-2);border:1px solid var(--ink-border);border-radius:11px;padding:3px}
  .seg button{border:0;background:transparent;color:#CDBFE0;font:inherit;font-size:13px;font-weight:500;padding:7px 13px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--seg-on);color:#fff}
  .add{margin-left:auto;border:0;background:var(--magenta);color:#fff;font:inherit;font-weight:600;font-size:14px;padding:11px 16px;border-radius:11px;cursor:pointer;display:flex;gap:7px;align-items:center}
  .add:hover{filter:brightness(1.08)}
  .add[hidden]{display:none}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:14px}
  .tag{position:relative;background:var(--paper);color:var(--ink);border-radius:13px;padding:16px 16px 14px;cursor:pointer;border:1px solid var(--paper-edge);box-shadow:0 10px 22px rgba(0,0,0,.22);transition:transform .14s ease, box-shadow .14s ease;text-align:left;font:inherit;width:100%;display:flex;flex-direction:column;gap:11px;min-height:138px}
  .tag:hover{transform:translateY(-3px);box-shadow:0 16px 30px rgba(0,0,0,.3)}
  .tag:focus-visible{outline:3px solid var(--magenta);outline-offset:2px}
  .tag .hole{position:absolute;top:13px;right:14px;width:13px;height:13px;border-radius:50%;background:var(--hole);box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
  .tag .cat{font-family:'JetBrains Mono';font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--brand);text-transform:uppercase}
  .tag .name{font-family:'Barlow Condensed';font-weight:600;font-size:21px;line-height:1.04;text-transform:uppercase;padding-right:22px}
  .tag .id{font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted);margin-top:-5px}
  .spacer{flex:1}
  .status{display:inline-flex;align-items:center;gap:7px;font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:1.2px;text-transform:uppercase;padding:4px 10px;border-radius:7px;width:fit-content}
  .status.in{background:var(--in-soft);color:var(--in)}
  .status.out{background:var(--out-soft);color:var(--out)}
  .dot{width:8px;height:8px;border-radius:50%;background:currentColor}
  .who{font-size:12.5px;color:#4a4153;line-height:1.4}
  .who b{color:var(--ink);font-weight:600}
  .tag.is-out{background:linear-gradient(180deg,#FFFDF9,#FBF4E9)}
  .tag.is-out::after{content:"";position:absolute;inset:0;border-radius:13px;border:1.5px solid #EAD8BC;pointer-events:none}

  .empty{grid-column:1/-1;text-align:center;color:#B3A6C2;padding:50px 20px;border:1.5px dashed var(--ink-border);border-radius:14px}
  .empty b{display:block;font-family:'Barlow Condensed';font-size:20px;color:#fff;margin-bottom:5px;text-transform:uppercase}

  .scrim{position:fixed;inset:0;background:rgba(15,8,24,.64);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:40}
  .scrim.show{display:flex}
  @media(min-width:560px){.scrim{align-items:center;padding:20px}}
  .sheet{background:var(--paper);color:var(--ink);width:100%;max-width:460px;border-radius:18px 18px 0 0;padding:22px 20px 24px;box-shadow:0 -10px 40px rgba(0,0,0,.4);max-height:92vh;overflow:auto}
  @media(min-width:560px){.sheet{border-radius:18px}}
  .sheet h2{font-family:'Barlow Condensed';font-weight:700;font-size:27px;line-height:1;margin:0;text-transform:uppercase;padding-right:30px}
  .sheet .sub{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);margin:5px 0 0}
  .closeX{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:18px;color:var(--muted);line-height:1}
  .sheetHead{position:relative}
  .statusRow{margin:16px 0 6px}
  .field{margin:14px 0 0}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:15px;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus{outline:2px solid var(--brand);outline-offset:0;border-color:var(--brand)}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  .actions{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;border:0;border-radius:11px;padding:13px;font:inherit;font-weight:600;font-size:15px;cursor:pointer}
  .btn-out{background:var(--out);color:#fff}.btn-in{background:var(--in);color:#fff}
  .btn-go{background:var(--magenta);color:#fff}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink);flex:none;padding:13px 16px}
  .btn:hover{filter:brightness(1.06)}
  .btn:disabled{opacity:.55;cursor:default}
  .readonly{margin-top:18px;background:#F3EFF8;border:1px solid #E4DAF0;border-radius:12px;padding:12px 14px;font-size:13px;color:#5a4a72;text-align:center}
  .borrowedBox{background:var(--out-soft);border:1px solid #EAD8BC;border-radius:12px;padding:13px 14px;margin-top:14px}
  .borrowedBox .lab{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--out);font-weight:600}
  .borrowedBox .nm{font-family:'Barlow Condensed';font-size:21px;font-weight:600;margin-top:2px}
  .borrowedBox .meta{font-size:12.5px;color:#6b5535;margin-top:3px}
  .hist{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
  .hist h3{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:0 0 9px}
  .hrow{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .hrow:last-child{border-bottom:0}
  .hrow .nm{font-weight:600}
  .hrow .dt{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);white-space:nowrap;text-align:right}
  .hist .none{font-size:13px;color:var(--muted)}
  .danger{margin-top:16px;text-align:center}
  .danger button{background:none;border:0;color:#b03a3a;font:inherit;font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .help{font-size:12.5px;color:#5a4a72;line-height:1.55;margin-top:14px}
  .help a{color:var(--magenta);font-weight:600}
  .help code{background:#F0EBF6;border:1px solid #E4DAF0;border-radius:5px;padding:1px 5px;font-family:'JetBrains Mono';font-size:11.5px}
  .note{font-size:11.5px;color:#9a8fb0;text-align:center;margin-top:26px;line-height:1.5}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--ink-2);border:1px solid #5a4574;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:.25s;pointer-events:none;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.4);max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   1. SET YOUR REPO HERE  (owner = your GitHub username)
   ============================================================ */
const CONFIG = {
  owner:  'myronlai2000',
  repo:   'LSVC-Vault',
  branch: 'main',
  path:   'data.json'
};
/* ============================================================ */

const configured = !!(CONFIG.owner && CONFIG.repo && !/YOUR-/.test(CONFIG.owner+CONFIG.repo));
let state={items:[]}, view={f:'all',q:''}, admin=false, token=null, sha=null, lastLoad=0;

/* ---------- GitHub API ---------- */
const API = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}`;
const b64enc = s => btoa(unescape(encodeURIComponent(s)));
const b64dec = b => decodeURIComponent(escape(atob(b.replace(/\s/g,''))));
function ghHeaders(){ const h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}; if(token) h.Authorization='Bearer '+token; return h; }

async function ghRead(){
  const r=await fetch(`${API}/contents/${CONFIG.path}?ref=${CONFIG.branch}&t=${Date.now()}`,{headers:ghHeaders(),cache:'no-store'});
  if(r.status===404){ sha=null; return null; }
  if(!r.ok) throw new Error('read '+r.status);
  const j=await r.json(); sha=j.sha;
  return JSON.parse(b64dec(j.content));
}
async function ghWrite(msg){
  const put=async()=>{
    const body={message:msg||'Update kit board',content:b64enc(JSON.stringify(state,null,2)),branch:CONFIG.branch};
    if(sha) body.sha=sha;
    return fetch(`${API}/contents/${CONFIG.path}`,{method:'PUT',headers:{...ghHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});
  };
  let r=await put();
  if(r.status===409){ await ghRead(); r=await put(); }        // someone else committed: refresh sha, retry
  if(!r.ok) throw new Error('write '+r.status);
  const j=await r.json(); sha=j.content.sha;
}
async function ghCanWrite(t){
  try{ const r=await fetch(API,{headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+t}});
    if(!r.ok) return false; const j=await r.json(); return !!(j.permissions&&j.permissions.push);
  }catch(e){ return false; }
}

/* ---------- local fallback (preview / offline) ---------- */
const LKEY='kitboard_v1';
function localLoad(){ try{const v=localStorage.getItem(LKEY); if(v) return JSON.parse(v);}catch(e){} const s={items:seed()}; localSave(s); return s; }
function localSave(s){ try{localStorage.setItem(LKEY,JSON.stringify(s));}catch(e){} }

/* ---------- data ---------- */
async function load(){
  if(!configured){ return localLoad(); }
  try{ lastLoad=Date.now(); return (await ghRead()) || {items:seed()}; }
  catch(e){ console.warn(e); toast('Could not reach the board — showing offline copy'); return localLoad(); }
}
async function commit(msg){
  render();
  if(!configured){ localSave(state); return; }
  try{ await ghWrite(msg); }
  catch(e){ console.warn(e); toast('Save failed — reloading latest');
    try{ const d=await ghRead(); if(d){ state=d; render(); } }catch(_){}
  }
}
async function reloadLive(force){
  if(!configured) return;
  if(!force && Date.now()-lastLoad<12000) return;
  try{ const d=await ghRead(); if(d){ state=d; lastLoad=Date.now(); render(); } }catch(e){}
}

function seed(){
  const mk=(id,name,cat)=>({id,name,cat,status:'in',borrower:null,out:null,due:null,note:null,history:[]});
  return [
    mk('BALL-01','Match balls ×6','Balls'),mk('BALL-02','Training ball bag','Balls'),mk('CART-01','Ball trolley','Balls'),
    mk('NET-01','Competition net','Net & court'),mk('NET-02','Training net','Net & court'),mk('ANT-01','Antennae set','Net & court'),
    mk('SCORE-01','Flip scoreboard','Officiating'),mk('REF-01','Referee stand','Officiating'),mk('WHIS-01','Whistle pack','Officiating'),
    mk('AID-01','First aid kit','Misc'),mk('PUMP-01','Pump + needles','Misc'),mk('BIB-01','Training bibs set','Misc'),
  ];
}

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmt(ts){ if(!ts)return''; const d=new Date(ts); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+', '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function fmtShort(ts){ return ts?new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):''; }
function ago(ts){ if(!ts)return''; const d=Math.floor((Date.now()-ts)/86400000); return d<=0?'today':d===1?'yesterday':d+' days ago'; }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }
function byId(id){ return state.items.find(i=>i.id===id); }

/* ---------- admin / lock ---------- */
function lockIcon(open){ return open
  ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.5-2"/></svg>'
  : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>'; }
function setAdmin(v){
  admin=v;
  const b=$('#lockBtn');
  b.classList.toggle('on',v);
  b.innerHTML=lockIcon(v)+(v?'Editing on':'Locked');
  $('#addBtn').hidden=!v;
  $('#refreshBtn').hidden=!configured;
  $('.livedot').classList.toggle('off',!configured);
  const ft=$('#footText');
  if(!configured) ft.textContent = v ? 'Preview mode — changes save to this browser only. Set your repo to go live.' : 'Preview mode — not connected to GitHub yet.';
  else ft.textContent = v ? 'Editing as owner — your changes publish to the shared board.' : 'Live · read-only. Tap the lock to sign in and edit.';
}
function openLock(){
  if(admin){ setAdmin(false); if(configured){ token=null; try{localStorage.removeItem('kitboard_token');}catch(e){} } toast('Editing locked'); return; }
  if(!configured){ setAdmin(true); toast('Preview editing on'); return; }
  $('#sheet').innerHTML=`
    <div class="sheetHead"><button class="closeX" data-close>×</button>
      <h2>Sign in to edit</h2><div class="sub">Owner access · Loughborough Students Volleyball</div></div>
    <div class="field"><label>GitHub access token</label><input id="tk" type="password" placeholder="github_pat_…" autocomplete="off"></div>
    <div class="actions"><button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-go" id="tkGo">Unlock</button></div>
    <div class="help">Paste your fine-grained token with <code>Contents: Read and write</code> on this repo. It's stored only in this browser and never uploaded. <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">Create a token ↗</a></div>`;
  showSheet(); const inp=$('#tk'); inp.focus();
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') $('#tkGo').click(); });
  $('#tkGo').onclick=async()=>{
    const t=inp.value.trim(); if(!t){ inp.focus(); return; }
    const btn=$('#tkGo'); btn.disabled=true; btn.textContent='Checking…';
    const ok=await ghCanWrite(t);
    if(ok){ token=t; try{localStorage.setItem('kitboard_token',t);}catch(e){} setAdmin(true); await reloadLive(true); closeSheet(); toast('Signed in — editing unlocked'); }
    else{ btn.disabled=false; btn.textContent='Unlock'; inp.style.borderColor='var(--magenta)'; inp.value=''; toast('That token can’t write to this repo'); }
  };
}

/* ---------- render ---------- */
function render(){
  const q=view.q.trim().toLowerCase();
  let list=state.items.filter(i=>{
    if(view.f!=='all'&&i.status!==view.f) return false;
    if(q&&!(i.name.toLowerCase().includes(q)||i.cat.toLowerCase().includes(q)||i.id.toLowerCase().includes(q))) return false;
    return true;
  });
  $('#cIn').textContent=state.items.filter(i=>i.status==='in').length;
  $('#cOut').textContent=state.items.filter(i=>i.status==='out').length;
  const g=$('#grid');
  if(!list.length){ g.innerHTML=`<div class="empty"><b>Nothing here</b>${state.items.length?'Try a different filter or search.':'Sign in to add your first item.'}</div>`; return; }
  g.innerHTML=list.map(i=>{
    const out=i.status==='out';
    const last=i.history.filter(h=>h.returned).slice(-1)[0];
    let who = out ? `Out with <b>${esc(i.borrower)}</b> · since ${esc(fmtShort(i.out))}`+(i.due?` · due ${esc(fmtShort(i.due))}`:'')
            : last ? `Last out: <b>${esc(last.borrower)}</b> · back ${esc(fmtShort(last.returned))}`
            : 'Not borrowed yet';
    return `<button class="tag ${out?'is-out':''}" data-id="${esc(i.id)}"><span class="hole"></span>
      <div class="cat">${esc(i.cat)}</div><div class="name">${esc(i.name)}</div><div class="id">${esc(i.id)}</div>
      <div class="spacer"></div><span class="status ${out?'out':'in'}"><span class="dot"></span>${out?'Out':'In'}</span>
      <div class="who">${who}</div></button>`;
  }).join('');
}

/* ---------- detail ---------- */
function openDetail(id){
  const i=byId(id); if(!i) return;
  const out=i.status==='out';
  const hist=[...i.history].reverse().slice(0,8);
  const histHtml=hist.length?hist.map(h=>`<div class="hrow"><span class="nm">${esc(h.borrower)}</span><span class="dt">${esc(fmtShort(h.out))}${h.returned?' → '+esc(fmtShort(h.returned)):' → out'}</span></div>`).join(''):`<div class="none">No borrow history yet.</div>`;
  const borrowed=out?`<div class="borrowedBox"><div class="lab">Currently out with</div><div class="nm">${esc(i.borrower)}</div><div class="meta">Since ${esc(fmt(i.out))} (${esc(ago(i.out))})${i.due?` · due ${esc(fmtShort(i.due))}`:''}</div>${i.note?`<div class="meta">Note: ${esc(i.note)}</div>`:''}</div>`:'';
  const controls=admin
    ? `<div class="actions">${out?`<button class="btn btn-in" data-act="return">Return this</button>`:`<button class="btn btn-go" data-act="borrow">Borrow this</button>`}<button class="btn btn-ghost" data-act="edit">Edit</button></div>`
    : `<div class="readonly">View only — sign in to borrow or return.</div>`;
  $('#sheet').innerHTML=`<div class="sheetHead"><button class="closeX" data-close>×</button>
      <div class="sub">${esc(i.id)} · ${esc(i.cat)}</div><h2>${esc(i.name)}</h2>
      <div class="statusRow"><span class="status ${out?'out':'in'}"><span class="dot"></span>${out?'Out':'Available'}</span></div></div>
    ${borrowed}${controls}<div class="hist"><h3>Recent history</h3>${histHtml}</div>`;
  showSheet();
  $('#sheet').querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>{const a=b.dataset.act; if(a==='borrow')openBorrow(id); if(a==='return')doReturn(id); if(a==='edit')openEdit(id);});
}

/* ---------- borrow ---------- */
function openBorrow(id){
  if(!admin) return; const i=byId(id); if(!i) return;
  $('#sheet').innerHTML=`<div class="sheetHead"><button class="closeX" data-close>×</button>
      <div class="sub">${esc(i.id)} · sign out</div><h2>Borrow ${esc(i.name)}</h2></div>
    <div class="field"><label>Borrower name</label><input id="bName" placeholder="e.g. Sam Carter" autocomplete="off"></div>
    <div class="field"><label>Expected return <span style="text-transform:none;font-weight:400">(optional)</span></label><input id="bDue" type="date"></div>
    <div class="field"><label>Note <span style="text-transform:none;font-weight:400">(optional)</span></label><input id="bNote" placeholder="e.g. for Tuesday training" autocomplete="off"></div>
    <div class="actions"><button class="btn btn-ghost" data-back>Back</button><button class="btn btn-go" id="bGo">Sign it out</button></div>`;
  $('#bName').focus();
  $('#sheet [data-back]').onclick=()=>openDetail(id);
  $('#bGo').onclick=()=>{
    const name=$('#bName').value.trim(); if(!name){ $('#bName').style.borderColor='var(--magenta)'; $('#bName').focus(); return; }
    const due=$('#bDue').value?new Date($('#bDue').value+'T17:00').getTime():null; const note=$('#bNote').value.trim()||null;
    i.status='out'; i.borrower=name; i.out=Date.now(); i.due=due; i.note=note;
    i.history.push({borrower:name,out:i.out,due,note,returned:null});
    toast(`${i.name} signed out to ${name}`); closeSheet(); commit(`Borrow ${i.id} — ${name}`);
  };
}

/* ---------- return ---------- */
function doReturn(id){
  if(!admin) return; const i=byId(id); if(!i) return;
  const open=[...i.history].reverse().find(h=>!h.returned); if(open) open.returned=Date.now();
  const name=i.borrower; i.status='in'; i.borrower=null; i.out=null; i.due=null; i.note=null;
  toast(`${i.name} returned${name?` by ${name}`:''}`); closeSheet(); commit(`Return ${i.id}`);
}

/* ---------- add / edit ---------- */
function openEdit(id){
  if(!admin) return; const i=id?byId(id):null; const cats=['Balls','Net & court','Officiating','Misc'];
  $('#sheet').innerHTML=`<div class="sheetHead"><button class="closeX" data-close>×</button><h2>${id?'Edit item':'Add item'}</h2></div>
    <div class="field"><label>Name</label><input id="eName" value="${esc(i?i.name:'')}" placeholder="e.g. Spare net"></div>
    <div class="row2"><div class="field"><label>Category</label><select id="eCat">${cats.map(c=>`<option ${i&&i.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Asset ID</label><input id="eId" value="${esc(i?i.id:'')}" placeholder="auto" ${id?'disabled style="opacity:.6"':''}></div></div>
    <div class="actions"><button class="btn btn-ghost" data-back>${id?'Back':'Cancel'}</button><button class="btn btn-go" id="eGo">${id?'Save':'Add to board'}</button></div>
    ${id?`<div class="danger"><button id="eDel">Remove this item from the board</button></div>`:''}`;
  $('#sheet [data-back]').onclick=()=> id?openDetail(id):closeSheet();
  $('#eGo').onclick=()=>{
    const name=$('#eName').value.trim(); if(!name){ $('#eName').style.borderColor='var(--magenta)'; $('#eName').focus(); return; }
    const cat=$('#eCat').value;
    if(id){ i.name=name; i.cat=cat; toast('Saved'); closeSheet(); commit(`Edit ${i.id}`); }
    else{
      let nid=$('#eId').value.trim().toUpperCase();
      if(!nid){ const pre=(cat.match(/[A-Za-z]+/)||['ITEM'])[0].slice(0,4).toUpperCase(); let n=1; while(byId(`${pre}-${String(n).padStart(2,'0')}`)) n++; nid=`${pre}-${String(n).padStart(2,'0')}`; }
      if(byId(nid)){ $('#eId').style.borderColor='var(--magenta)'; toast('That asset ID is taken'); return; }
      state.items.push({id:nid,name,cat,status:'in',borrower:null,out:null,due:null,note:null,history:[]});
      toast('Added to board'); closeSheet(); commit(`Add ${nid}`);
    }
  };
  if(id) $('#eDel').onclick=()=>{ if(i.status==='out'){ toast('Return it before removing'); return; } state.items=state.items.filter(x=>x.id!==id); toast('Removed'); closeSheet(); commit(`Remove ${i.id}`); };
  $('#eName').focus();
}

/* ---------- sheet plumbing ---------- */
function showSheet(){ $('#scrim').classList.add('show'); document.body.style.overflow='hidden'; $('#sheet').querySelectorAll('[data-close]').forEach(b=>b.onclick=closeSheet); }
function closeSheet(){ $('#scrim').classList.remove('show'); document.body.style.overflow=''; }
$('#scrim').addEventListener('click',e=>{ if(e.target===$('#scrim')) closeSheet(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

/* ---------- wiring ---------- */
$('#grid').addEventListener('click',e=>{ const t=e.target.closest('.tag'); if(t) openDetail(t.dataset.id); });
$('#addBtn').onclick=()=>openEdit(null);
$('#lockBtn').onclick=openLock;
$('#refreshBtn').onclick=()=>{ reloadLive(true); toast('Refreshed'); };
$('#q').addEventListener('input',e=>{ view.q=e.target.value; render(); });
$('#filter').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return; view.f=b.dataset.f; $('#filter').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b)); render(); });
window.addEventListener('focus',()=>reloadLive(false));

/* ---------- boot ---------- */
(async()=>{
  if(configured){ try{ token=localStorage.getItem('kitboard_token')||null; }catch(e){} }
  state=await load(); if(!state.items) state.items=[];
  if(configured){ setAdmin(token ? await ghCanWrite(token) : false); if(admin===false && token){ token=null; try{localStorage.removeItem('kitboard_token');}catch(e){} } }
  else{ setAdmin(false); }
  render();
})();
</script>
